<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Ball Clicker</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
<link href= "click.css" rel = "stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>

</style>
</head>

<body style="background-image: url('https://wallpaperaccess.com/full/629584.png'); background-size: cover;">

<nav>
    <div class="nav-wrapper">
        <a href="#!" class="brand-logo">Dragon Ball Legion</a>
        <ul class="right hide-on-med-and-down">
            <li><a href="sass.html"><img src="./img/goku.png" width="100px"></a></li>
            <li><a href="badges.html"><img src="./img/vegeta.png" width="100px"></a></li>
        </ul>
    </div>
</nav>
<div id = "conteneur">
<div id="genkidamaContainer">
    <img id="genkidama" src="./img/Genkidama_DB_scheme.png" width="200px">
</div>

<button id="gokuButton">
    <img id = "kagu" src="./img/kugo.png" width="200px">
</button>

</div>


<div id="clickCount"></div>

<script>
let click = 0;
const display = document.getElementById('clickCount');
const genkidama = document.getElementById('genkidamaContainer');
const genki = document.getElementById('genkidama')
const image = document.getElementById('kagu');

document.getElementById('gokuButton').addEventListener('click', function() {
    click++;
    display.textContent = "Nombre de clicks : " + click;

    if (click === 10) {
        genkidama.style.display = "block";
        image.src = "img/premier.png";
    }
    else if (click === 30) {
        image.src = "img/pramier.png";
    }
    else if (click === 35) {
        genki.src = "img/genki2.png";
    }
});
</script>

</body>
</html>
