<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dragon Ball Clicker</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
<link href="click.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
    #stats {
        display: flex;
        justify-content: center;
        gap: 50px;
        font-size: 18px;
        font-weight: bold;
        margin-top: 10px;
        color: white;
        text-shadow: 1px 1px 2px black;
    }
</style>
</head>
<body style="background-image: url('https://wallpaperaccess.com/full/629584.png'); background-size: cover;">
<nav>
    <div class="nav-wrapper">
        <a href="#!" class="brand-logo">Dragon Ball Legion</a>
        <ul class="right hide-on-med-and-down">
            <li><a href="sass.html"><img src="./img/goku.png" width="100px"></a></li>
            <li><a href="badges.html"><img src="./img/vegeta.png" width="100px"></a></li>
        </ul>
    </div>
</nav>

<div class="row">
    <div class="col s6">
        <div id="conteneur">
            <div id="genkidamaContainer">
                <img id="genkidama" src="./img/Genkidama_DB_scheme.png">
            </div>
            <button class="transform" id="gokuButton">
                <img id="kagu" src="./img/kugo.png" width="100px">
            </button>
            <dialog id="modal">
            <h2 id = "titre">Hello !</h2>
            <img src = "" id = "images">
            <button onclick="modal.close()" id = "closeModal">Fermer</button>
            </dialog>
        </div>
        <div id="stats">
            <div id="clickCount">Nombre de clicks : 0</div>
            <div id="valcount">Ki collectés : 0</div>
        </div>
    </div>




    <div class="col s6">
        <ul class="collection">
            <li id = "li1" class="collection-item">clicks x2<button class="achat" id="achat1">100ki</button></li>
            <li id = "li2" class="collection-item">clicks x4<button class="achat" id = "achat2">300ki</button></li>
            <li class="collection-item">clicks x10<button class="achat">1000ki</button></li>
            <li class="collection-item">2p par click<button class="achat">200ki</button></li>
            <li class="collection-item">20p par click<button class="achat">500ki</button></li>
            <li class="collection-item">100p par click<button class="achat">1000ki</button></li>
            <li class="collection-item">500p par click<button class="achat">2000ki</button></li>
            <li class="collection-item">2000p par click<button class="achat">500000ki</button></li>
            <li class="collection-item">Faire un genki dama !<button class="achat">Maitrise ton esprit !</button></li>
        </ul>
    </div>
</div>

<script src = "click.js">
</script>
</body>
</html>
