<div class="row">

    <div class="col s6">

        <div id="conteneur">
            <p id = "data">Goku est calme</p>
            <div id="genkidamaContainer">
                <img id="genkidama" src="./img/Genkidama_DB_scheme.png">
            </div>
            <button class="transform" id="gokuButton">
                <img id="kagu" src="./img/kugo.png" width="100px">
            </button>
            <dialog id="modal">
            <h2 id = "titre">Hello !</h2>
            <img src = "" id = "images">
            <button onclick="modal.close()" id = "closeModal">Fermer</button>
            </dialog>
        </div>
        <div id="stats">
            <div id="clickCount">Nombre de clicks : 0</div>
            <div id="valcount">Ki collectés : 0</div>
        </div>
    </div>






    <div class="col s6">
        <ul class="collection">
            <li id = "li1" class="collection-item">2p par click<button class="achat" id ="achat1">200ki</button></li>
            <li id = "li2" class="collection-item">20p par click<button class="achat" id = "achat2">500ki</button></li>
            <li id = "li3" class="collection-item">100p par click<button class="achat" id = "achat3">1000ki</button></li>
            <li id = "li4" class="collection-item">500p par click<button class="achat" id = "achat4">2000ki</button></li>
            <li id = "li5" class="collection-item">2000p par click<button class="achat" id = "achat5">500000ki</button></li>
            <li id = "li6" class="collection-item">Faire un genki dama !<button class="achat" id = "achat6">Maitrise ton esprit !</button></li>
        </ul>
    </div>
</div>
